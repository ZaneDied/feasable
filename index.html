<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Timeline">
    
    <title>Cloud Constraint Timeline</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --grid: rgba(255, 255, 255, 0.05);
            --day-width: 140px;
            --sidebar-width: 320px;
            --accent: #38bdf8;
            --today-color: #ef4444;
            --resizer-w: 4px;
            --font-hand: 'Architects Daughter', cursive;
            --font-code: 'Fira Code', monospace;
            
            /* iOS Safe Area Constants */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        .dragging, .resizing {
            user-select: none !important;
            cursor: grabbing !important;
        }

        /* --- LEFT-SIDE SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; border: 2px solid var(--panel); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: var(--font-code);
            display: flex; height: 100vh; overflow: hidden; color: #f8fafc;
            /* Prevent bouncing on iOS */
            position: fixed; 
            width: 100%;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: 150px; max-width: 600px;
            background-color: var(--panel);
            z-index: 2000; flex-shrink: 0;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.4s;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            direction: rtl; 
            overflow-y: auto; overflow-x: hidden;
        }

        .sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }

        .sidebar-content-wrapper {
            direction: ltr;
            display: flex; flex-direction: column;
            min-height: 100%; width: 100%;
            padding-top: var(--safe-top); /* Avoids Notch */
        }

        .month-selector {
            padding: 20px; background: #111827; border-bottom: 1px solid #334155;
            display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
        }
        
        .selector-row { display: flex; gap: 8px; width: 100%; }

        select, .today-btn {
            background: var(--bg); color: var(--accent); border: 1px solid #334155;
            padding: 10px; border-radius: 6px; font-weight: bold; font-size: 11px;
            outline: none; cursor: pointer; flex: 1; font-family: var(--font-code);
            -webkit-appearance: none; /* Removes iOS default styling */
        }

        #expression-editor {
            flex-grow: 1; background: transparent; color: #f8fafc;
            border: none; padding: 20px; font-size: 16px; line-height: 1.6;
            resize: none; outline: none; overflow: hidden;
            width: 100%; box-sizing: border-box; font-family: var(--font-code);
            padding-bottom: calc(var(--safe-bottom) + 20px);
        }

        /* --- TIMELINE --- */
        .date-header-container {
            position: sticky; top: 0; left: 0; height: calc(65px + var(--safe-top)); 
            z-index: 100; background: var(--bg);
            border-bottom: 1px solid var(--grid);
            display: flex; align-items: flex-end;
        }

        .date-label {
            position: absolute; bottom: 0; height: 65px; color: #94a3b8;
            width: var(--day-width); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            pointer-events: none; line-height: 1.1;
            font-family: var(--font-hand);
        }

        .date-number { font-size: 19px; font-weight: bold; }
        .date-dayname { font-size: 10px; opacity: 0.7; letter-spacing: 1px; }

        .today-label-active { color: #fff !important; background: var(--today-color); border-radius: 8px 8px 0 0; }

        .main-content {
            flex-grow: 1; position: relative; overflow: auto;
            background-image: linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: var(--day-width) 100%;
            cursor: grab;
            -webkit-overflow-scrolling: touch; /* Smooth iOS scroll */
        }
        
        .timeline-content { 
            min-height: 100%; position: relative; 
            padding-top: 0; 
            padding-bottom: calc(100px + var(--safe-bottom)); 
        }

        .today-marker-line {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--today-color); z-index: 60; pointer-events: none;
        }

        .h-zone { position: absolute; height: 44px; z-index: 20; border-radius: 4px; display: flex; align-items: center; pointer-events: none; }
        .clamped-group {
            position: sticky; left: 10px; padding: 6px 10px; display: flex; flex-direction: column;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border-radius: 8px;
            z-index: 50; border: 1.5px solid rgba(255,255,255,0.15);
            font-family: var(--font-hand);
        }
        .subject-name { font-weight: bold; font-size: 13px; color: inherit; }
        .comment-text { font-size: 11px; opacity: 0.9; white-space: nowrap; margin-top: -2px; }

        .v-line { position: absolute; top: 0; bottom: 0; width: 1.5px; z-index: 10; opacity: 0.3; pointer-events: none; }

        /* --- UI ELEMENTS --- */
        .toggle-btn {
            position: fixed; left: var(--sidebar-width); top: calc(20px + var(--safe-top));
            width: 40px; height: 40px; background: var(--accent);
            border: none; color: var(--bg); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 0 8px 8px 0; z-index: 3000;
            font-weight: bold; font-size: 18px;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }
        
        .sidebar.collapsed + .resizer + .main-content + .toggle-btn { left: 0; }
        .resizer { width: var(--resizer-w); cursor: col-resize; background: rgba(255, 255, 255, 0.05); z-index: 1001; position: relative; }

        @media (max-width: 768px) {
            :root { --day-width: 85px; }
            .sidebar { position: fixed; width: 100vw !important; height: 100vh; left: 0; top: 0; transform: translateX(-100%); max-width: none; direction: ltr; }
            .sidebar-content-wrapper { direction: ltr; }
            .sidebar:not(.collapsed) { transform: translateX(0); }
            .resizer { display: none; }
            .toggle-btn { position: fixed; right: 20px; bottom: calc(30px + var(--safe-bottom)); left: auto !important; top: auto !important; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; z-index: 9999; }
        }
    </style>
</head>
<body id="app-body">

    <div class="sidebar collapsed" id="sidebar">
        <div class="sidebar-content-wrapper">
            <div class="month-selector">
                <label style="font-size: 9px; color: #64748b; font-weight: bold; letter-spacing: 1px;">DATABASE CONTEXT</label>
                <div class="selector-row">
                    <select id="month-picker"></select>
                    <button class="today-btn" id="today-btn">TODAY</button>
                </div>
                <div id="status" style="font-size: 9px; color: #4ade80; text-align: center; font-weight: bold;">SYNCED</div>
            </div>
            <textarea id="expression-editor" spellcheck="false" placeholder="{10 <= physics <= 20, comment}"></textarea>
        </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="main-content" id="viewport">
        <div class="date-header-container" id="header-row"></div>
        <div class="timeline-content" id="timeline"></div>
    </div>

    <button class="toggle-btn" id="toggle-sidebar">✎</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAJ5BiW7eaNrS2JdWVoxoPqKBODllPEUsU",
        authDomain: "fisable-9095d.firebaseapp.com",
        databaseURL: "https://fisable-9095d-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fisable-9095d",
        storageBucket: "fisable-9095d.firebasestorage.app",
        messagingSenderId: "16254478711",
        appId: "1:16254478711:web:85270628ab9a0aa932d972"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'constraints');

    const editor = document.getElementById('expression-editor');
    const timeline = document.getElementById('timeline');
    const headerRow = document.getElementById('header-row');
    const viewport = document.getElementById('viewport');
    const monthPicker = document.getElementById('month-picker');
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-sidebar');
    const resizer = document.getElementById('resizer');

    const currentDate = new Date();
    const realYear = currentDate.getFullYear();
    const realMonth = currentDate.getMonth(); 
    const realDay = currentDate.getDate();
    let masterData = {};
    const COLORS = ['#38bdf8', '#f472b6', '#fbbf24', '#a855f7', '#4ade80', '#2dd4bf'];

    const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    MONTHS.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.innerText = m;
        if(i === realMonth) opt.selected = true;
        monthPicker.appendChild(opt);
    });

    function autoResize() {
        editor.style.height = 'auto';
        editor.style.height = (editor.scrollHeight) + 'px';
    }
    editor.addEventListener('input', autoResize);

    // --- INTERACTIONS ---
    let isResizing = false, isPanning = false, startX, startY, scrollLeft, scrollTop;

    resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.classList.add('resizing'); e.preventDefault(); });
    viewport.addEventListener('mousedown', (e) => {
        if (e.target.closest('.clamped-group')) return;
        isPanning = true; document.body.classList.add('dragging');
        startX = e.pageX - viewport.offsetLeft; startY = e.pageY - viewport.offsetTop;
        scrollLeft = viewport.scrollLeft; scrollTop = viewport.scrollTop;
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (isResizing) {
            let newWidth = e.clientX;
            if (newWidth > 150 && newWidth < 600) document.documentElement.style.setProperty('--sidebar-width', newWidth + 'px');
        }
        if (isPanning) {
            viewport.scrollLeft = scrollLeft - (e.pageX - viewport.offsetLeft - startX);
            viewport.scrollTop = scrollTop - (e.pageY - viewport.offsetTop - startY);
        }
    });

    document.addEventListener('mouseup', () => { isResizing = false; isPanning = false; document.body.classList.remove('resizing', 'dragging'); });

    toggleBtn.onclick = () => {
        sidebar.classList.toggle('collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        toggleBtn.innerText = isCollapsed ? '✎' : (window.innerWidth <= 768 ? '✕' : '◀');
        if (window.innerWidth > 768) toggleBtn.style.left = isCollapsed ? '0px' : 'var(--sidebar-width)';
    };

    // --- DATA ---
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) { masterData = data; renderGraph(); setTimeout(autoResize, 50); }
    });

    function saveToCloud() {
        masterData[monthPicker.value] = editor.value;
        set(dbRef, masterData);
    }

    function renderGraph() {
        const dw = window.innerWidth <= 768 ? 85 : 140;
        document.documentElement.style.setProperty('--day-width', dw + 'px');
        const viewMonthIdx = parseInt(monthPicker.value);
        const daysInView = new Date(realYear, viewMonthIdx + 1, 0).getDate();
        
        editor.value = masterData[viewMonthIdx] || "";
        timeline.innerHTML = ''; headerRow.innerHTML = '';
        const totalWidth = daysInView * dw;
        timeline.style.width = totalWidth + "px";
        headerRow.style.width = totalWidth + "px";

        for (let i = 1; i <= daysInView; i++) {
            const dateObj = new Date(realYear, viewMonthIdx, i);
            const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
            const isToday = (viewMonthIdx === realMonth && i === realDay);
            
            const lbl = document.createElement('div');
            lbl.className = 'date-label' + (isToday ? ' today-label-active' : '');
            lbl.style.left = ((i-1) * dw) + "px";
            lbl.innerHTML = `<span class="date-number">${i}</span><span class="date-dayname">${dayName.toUpperCase()}</span>`;
            headerRow.appendChild(lbl);
            
            if (isToday) {
                const laser = document.createElement('div');
                laser.className = 'today-marker-line';
                laser.style.left = ((i-1) * dw) + "px";
                timeline.appendChild(laser);
            }
        }

        let globalIndex = 0;
        let vLinesToDraw = {}; 

        Object.keys(masterData).sort().forEach(monthKey => {
            const matches = (masterData[monthKey] || "").match(/\{.*?\}/g) || [];
            matches.forEach((raw) => {
                const fullContent = raw.replace(/\{|\}/g, '').trim();
                const [logicPart, ...commentParts] = fullContent.split(',');
                const comment = commentParts.join(',').trim();
                const logic = logicPart.trim();
                const color = COLORS[globalIndex % COLORS.length];
                const yPos = 20 + (globalIndex * 60); 
                globalIndex++;

                const rangeMatch = logic.match(/^(\d+)\s*(<=|>=|<|>)\s*([a-zA-Z0-9_]+)\s*(<=|>=|<|>)\s*(\d+)$/);
                const varFirstMatch = logic.match(/^([a-zA-Z0-9_]+)\s*(<=|>=|<|>|=)\s*(\d+)$/);
                const numFirstMatch = logic.match(/^(\d+)\s*(<=|>=|<|>|=)\s*([a-zA-Z0-9_]+)$/);

                let name, left, right, showL = false, showR = false, shouldShow = false;
                const viewMonthInt = parseInt(monthPicker.value);
                const originMonthInt = parseInt(monthKey);

                if (rangeMatch) {
                    const [_, n1, o1, subName, o2, n2] = rangeMatch;
                    name = subName;
                    let v1 = parseInt(n1), v2 = parseInt(n2);
                    let min = null, max = null;
                    if (o1.includes('<')) min = o1 === '<' ? v1 + 1 : v1; else max = o1 === '>' ? v1 - 1 : v1;
                    if (o2.includes('<')) max = o2 === '<' ? v2 - 1 : v2; else min = o2 === '>' ? v2 + 1 : v2;
                    if (viewMonthInt === originMonthInt && min <= max) { left = min; right = max; showL = showR = shouldShow = true; }
                } else if (varFirstMatch || numFirstMatch) {
                    let op, val;
                    if (varFirstMatch) { name = varFirstMatch[1]; op = varFirstMatch[2]; val = parseInt(varFirstMatch[3]); }
                    else { name = numFirstMatch[3]; val = parseInt(numFirstMatch[1]); op = {'<':'>','>':'<','<=':'>=','>=':'<=','=':'='}[numFirstMatch[2]]; }
                    left = 1; right = daysInView;
                    if (op === '=') { if (viewMonthInt === originMonthInt) { left = right = val; showL = showR = shouldShow = true; } }
                    else if (op.includes('>')) {
                        const s = op === '>' ? val + 1 : val;
                        if (viewMonthInt === originMonthInt) { left = s; showL = shouldShow = true; } else if (viewMonthInt > originMonthInt) shouldShow = true;
                    } else if (op.includes('<')) {
                        const e = op === '<' ? val - 1 : val;
                        if (viewMonthInt === originMonthInt) { right = e; showR = shouldShow = true; } else if (viewMonthInt < originMonthInt) shouldShow = true;
                    }
                }

                if (shouldShow) {
                    if (showL) vLinesToDraw[(left - 1) * dw] = color;
                    if (showR) vLinesToDraw[right * dw] = color;
                    drawBar(name, comment, left, right, yPos, color, showL, showR, dw);
                }
            });
        });

        Object.keys(vLinesToDraw).forEach(x => {
            const line = document.createElement('div');
            line.className = 'v-line';
            line.style.left = x + "px";
            line.style.backgroundColor = vLinesToDraw[x];
            timeline.appendChild(line);
        });
    }

    function drawBar(name, comment, start, end, y, color, showL, showR, dw) {
        const bar = document.createElement('div');
        bar.className = 'h-zone';
        bar.style.cssText = `top:${y}px; left:${(start-1)*dw}px; width:${(end-start+1)*dw}px; background:${color}15; color:${color}; border-left:${showL?`2.5px solid ${color}`:'none'}; border-right:${showR?`2.5px solid ${color}`:'none'}`;
        bar.innerHTML = `<div class="clamped-group"><span class="subject-name">${name.toUpperCase()}</span>${comment?`<span class="comment-text">${comment}</span>`:''}</div>`;
        timeline.appendChild(bar);
    }

    editor.oninput = () => { saveToCloud(); autoResize(); };
    monthPicker.onchange = () => { renderGraph(); setTimeout(autoResize, 50); };
    window.onresize = renderGraph;

    document.getElementById('today-btn').onclick = () => {
        monthPicker.value = realMonth;
        renderGraph();
        const dw = window.innerWidth <= 768 ? 85 : 140;
        viewport.scrollLeft = (realDay - 1) * dw - (viewport.clientWidth / 2) + (dw / 2);
    };

    renderGraph();
</script>
</body>
</html>
